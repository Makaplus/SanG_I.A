{% extends "base.html" %}
{% block title %}SANG_I.A. - Consulta DB{% endblock %}

{% block content %}
<div class="card">
  <h2>Consultazione DB</h2>
  <div class="muted">Utente: <b>{{username}}</b> — ruolo: <b>{{role}}</b></div>
</div>

<div class="card">
  <div class="row" style="align-items:center;">
    <input id="q" placeholder="Cerca (testo libero su tutte le colonne)..." style="min-width:420px;">
    <button onclick="loadRows()">Cerca</button>
    <button class="secondary" onclick="resetSearch()">Reset</button>
    <span class="muted" id="info" style="margin-left:auto;"></span>
  </div>

  <div class="muted" style="margin-top:8px;">
    Tabella: <span id="tableName">-</span>
  </div>

  <div style="overflow:auto; margin-top:10px;">
    <table id="tbl">
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script>
  const ALLOWED = [
    "id",
    "nome_file",
    "rgnr",
    "anno",
    "procura",
    "operazione_nome",
    "numero_pagine",
    "snippet_testo",
    "data_inserimento"
  ];

  let tableCols = [];
  let tableRows = [];
  let viewCols = [];
  let viewIdx = [];
  let sortState = { key: null, dir: "asc" };

  function esc(s){
    return (s ?? "").toString()
      .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
      .replaceAll('"',"&quot;").replaceAll("'","&#039;");
  }

  function isNumericVal(v){
    if(v === null || v === undefined) return false;
    const s = String(v).trim();
    if(s === "") return false;
    return /^-?\d+(\.\d+)?$/.test(s);
  }

  function cmpValues(a, b){
    const sa = (a ?? "").toString().trim();
    const sb = (b ?? "").toString().trim();
    const ea = sa === "";
    const eb = sb === "";
    if(ea && eb) return 0;
    if(ea) return 1;
    if(eb) return -1;

    const na = isNumericVal(sa);
    const nb = isNumericVal(sb);
    if(na && nb){
      const fa = parseFloat(sa);
      const fb = parseFloat(sb);
      if(fa < fb) return -1;
      if(fa > fb) return 1;
      return 0;
    }

    const la = sa.toLowerCase();
    const lb = sb.toLowerCase();
    if(la < lb) return -1;
    if(la > lb) return 1;
    return 0;
  }

  function buildViewMapping(){
    const idxByName = {};
    tableCols.forEach((c, i) => { idxByName[(c ?? "").toString()] = i; });

    viewCols = [];
    viewIdx = [];

    for(const key of ALLOWED){
      if(idxByName.hasOwnProperty(key)){
        viewCols.push(key);
        viewIdx.push(idxByName[key]);
      }
    }
  }

  function renderTable(){
    const thead = document.getElementById("thead");
    const tbody = document.getElementById("tbody");
    thead.innerHTML = "";
    tbody.innerHTML = "";

    const trh = document.createElement("tr");
    trh.innerHTML = viewCols.map(c => {
      let arrow = "";
      if(sortState.key === c){
        arrow = sortState.dir === "asc" ? " ▲" : " ▼";
      }
      return `<th data-col="${esc(c)}" style="cursor:pointer; user-select:none;">${esc(c)}${arrow}</th>`;
    }).join("");
    thead.appendChild(trh);

    Array.from(trh.querySelectorAll("th")).forEach(th => {
      th.addEventListener("click", () => {
        const col = th.getAttribute("data-col");
        toggleSort(col);
      });
    });

    for(const row of tableRows){
      const tr = document.createElement("tr");
      tr.innerHTML = viewIdx.map(i => `<td>${esc(row[i])}</td>`).join("");
      tbody.appendChild(tr);
    }
  }

  function toggleSort(col){
    if(sortState.key === col){
      sortState.dir = (sortState.dir === "asc") ? "desc" : "asc";
    } else {
      sortState.key = col;
      sortState.dir = "asc";
    }
    sortRows();
    renderTable();
  }

  function sortRows(){
    if(!sortState.key) return;
    const idx = viewCols.indexOf(sortState.key);
    if(idx < 0) return;
    const realIdx = viewIdx[idx];

    tableRows.sort((ra, rb) => {
      const c = cmpValues(ra[realIdx], rb[realIdx]);
      return sortState.dir === "asc" ? c : -c;
    });
  }

  async function loadRows(){
    const q = document.getElementById("q").value.trim();
    const url = q ? `/api/documenti?limit=200&q=${encodeURIComponent(q)}` : `/api/documenti?limit=200`;

    const r = await fetch(url);
    const j = await r.json();

    if(!r.ok || !j.ok){
      document.getElementById("info").textContent = j.error || "Errore";
      return;
    }

    document.getElementById("tableName").textContent = j.table || "-";

    tableCols = (j.columns || []).map(x => (x ?? "").toString());
    tableRows = (j.rows || []).slice();

    buildViewMapping();

    if(viewCols.length === 0){
      document.getElementById("info").textContent =
        "Nessuna delle colonne richieste è presente nel DB (controlla nomi colonne).";
      renderTable();
      return;
    }

    if(viewCols.includes("id")){
      sortState = { key: "id", dir: "asc" };
      sortRows();
    } else {
      sortState = { key: null, dir: "asc" };
    }

    document.getElementById("info").textContent =
      `Mostro ${tableRows.length} righe — colonne: ${viewCols.length}`;

    renderTable();
  }

  function resetSearch(){
    document.getElementById("q").value = "";
    loadRows();
  }

  loadRows();
</script>
{% endblock %}
