<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}SANGIA{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body>
  <div class="banner">
    <img src="{{ url_for('static', filename='banner.svg') }}" onerror="this.style.display='none'" alt="SANGIA banner">
  </div>
  <nav class="navbar">
    {% if role == 'admin' %}
      <a class="navbtn" href="/admin">Admin</a>
      <a class="navbtn" href="/organizzatore">Organizzatore</a>
      <a class="navbtn" href="/reader">Reader</a>
      <a class="navbtn" href="/smistamento_web">Libreria</a>
      <a class="navbtn" href="/consulta">Consulta DB</a>
      <a class="navbtn primary" href="/chatbot">Chatbox</a>
    {% else %}
      <a class="navbtn" href="/consulta">Consulta DB</a>
      <a class="navbtn primary" href="/chatbot">Chatbox</a>
    {% endif %}
    <a class="navbtn danger" href="/logout">Logout</a>
  </nav>
  <main class="container">{% block content %}{% endblock %}</main>
</body>
</html>
