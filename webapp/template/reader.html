<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>SANG_I.A. - Reader</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
  <style>
    .cudaBadge{
      display:flex; gap:10px; align-items:center;
      border:1px solid #2b3a55;
      padding:8px 12px;
      border-radius:999px;
      font-size: 13px;
      background:#0b1220;
    }
    .dot{width:12px;height:12px;border-radius:50%;background:#999}
    .dot.green{background: var(--ok)}
    .dot.red{background: var(--danger)}
  </style>
</head>
<body>

<div class="banner">
  <img src="{{ url_for('static', filename='banner.svg') }}" alt="SANGIA banner">
</div>

<div class="navbar">
  <a class="navbtn" href="/admin">Admin</a>
  <a class="navbtn" href="/consulta">Consulta DB</a>
  <a class="navbtn" href="/organizzatore">Organizzatore</a>
  <a class="navbtn primary" href="/reader">Reader</a>
  <a class="navbtn" href="/smistamento_web">Smistamento Web</a>
  <a class="navbtn danger" href="/logout">Logout</a>
</div>

<div class="container">

  <div class="card">
    <div class="row">
      <div>
        <h2>Reader</h2>
        <div class="muted">Work in progress. (Pagina pronta per essere riempita)</div>
      </div>
      <div class="cudaBadge" style="margin-left:auto;">
        <div id="cudaDot" class="dot"></div>
        <div>
          <div id="cudaText"><b>CUDA:</b> controllo...</div>
          <div id="cudaSub" class="muted"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <h3>Stato</h3>
    <div class="muted">Qui inseriremo funzioni di lettura/estrazione quando vuoi.</div>
  </div>

</div>

<script>
const cudaDot=document.getElementById('cudaDot'),cudaText=document.getElementById('cudaText'),cudaSub=document.getElementById('cudaSub');
async function refreshCuda(){
  try{
    const d=await (await fetch('/api/cuda-status')).json();
    const tv=d.torch_version||'n/d',cv=d.cuda_runtime_version||'n/d';
    if(!d.ok){
      cudaDot.className='dot red';cudaText.innerHTML='<b>CUDA:</b> errore';
      cudaSub.textContent=`${d.note||''} | torch=${tv} cuda_rt=${cv}`;return;
    }
    if(d.cuda_available){
      cudaDot.className='dot green';cudaText.innerHTML='<b>CUDA:</b> OK';
      cudaSub.textContent=`${d.device_name||('GPU x'+(d.device_count||0))} | torch=${tv} cuda_rt=${cv}`;
    } else {
      cudaDot.className='dot red';cudaText.innerHTML='<b>CUDA:</b> CPU';
      cudaSub.textContent=`${d.note||'torch vede solo CPU'} | torch=${tv} cuda_rt=${cv}`;
    }
  }catch(e){
    cudaDot.className='dot red';cudaText.innerHTML='<b>CUDA:</b> errore';cudaSub.textContent=String(e)
  }
}
refreshCuda(); setInterval(refreshCuda,5000);
</script>

</body>
</html>
