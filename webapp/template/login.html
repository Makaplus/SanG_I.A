<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>SANG_I.A. - Login</title>
  <style>
    body{margin:0;font-family:Arial,Helvetica,sans-serif;height:100vh;display:flex;align-items:center;justify-content:center;background-image:url("{{ url_for('static', filename='login_bg.svg') }}");background-size:cover;background-position:center;background-repeat:no-repeat;}
    body::before{content:"";position:absolute;inset:0;background:rgba(0,0,0,0.55);backdrop-filter: blur(2px);}
    .login-box{position:relative;z-index:1;width:390px;padding:28px;border-radius:16px;background:rgba(15, 23, 42, 0.86);box-shadow:0 20px 45px rgba(0,0,0,0.65);color:white;border:1px solid rgba(255,255,255,0.08);}
    h2{margin:0 0 18px 0;letter-spacing:2px;text-align:center;}
    input{width:100%;padding:12px;margin:10px 0;border-radius:10px;border:1px solid #334155;background:#0b1220;color:#e5e7eb;outline:none;}
    button{width:100%;padding:12px;border:none;border-radius:10px;background:#e11d48;color:white;font-weight:bold;cursor:pointer;}
    .error{background:#7f1d1d;padding:10px;border-radius:10px;margin-bottom:10px;text-align:center;}
  </style>
</head>
<body>
  <div class="login-box">
    <h2>SANG_I.A.</h2>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="POST" action="/login">
      <input name="username" placeholder="ID Utente" autocomplete="username" required>
      <input name="password" type="password" placeholder="Password" autocomplete="current-password" required>
      <button type="submit">Accedi</button>
    </form>
  </div>
</body>
</html>
