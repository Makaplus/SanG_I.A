[PERCORSI]
# Usa percorsi relativi alla root progetto (portabile su qualsiasi PC)
PROJECT_ROOT = .
INPUT_DIR = input_documenti
LIBRERIA_DIR = libreria
BACKUP_DIR = Backup
MEDIA_CACHE_DIR = .media_cache
BIBLIOTECA_DIR = input_documenti/biblioteca
ERROR_DIR = input_documenti/errore
DB_SQLITE_PATH = libreria/documenti.db
CHROMA_DIR = chroma_db
KB_JSONL = libreria/knowledge_base.jsonl

# Chiavi legacy usate da reset_errori_db.py (mantenute per compatibilità)
CARTELLA_INPUT_BASE = input_documenti
NOME_CARTELLA_INPUT = Documenti_da_Smistare
NOME_CARTELLA_NON_SMISTATI = Non Smistati
NOME_CARTELLA_ERRORI_DOC = ERRORI_DOC_CORROTTI
CARTELLA_LIBRERIA_BASE = libreria
NOME_CARTELLA_VARI_VERBALI = Vari_Verbali

[RUNTIME]
MAX_WORKERS = 4

[OCR]
OCR_PRIMARY_LANG = it
OCR_SECONDARY_LANG = en

[CHROMA]
CHROMA_COLLECTION = kb_semantica

[EMBEDDING]
EMBED_BATCH_SIZE = 64
EMBED_CONCURRENCY = 4
EMBED_MODEL = nomic-embed-text:latest

[LLM]
LLM_MODEL = llama3:8b

[PRIVACY]
ANONYMIZE_TELEMETRY = False
